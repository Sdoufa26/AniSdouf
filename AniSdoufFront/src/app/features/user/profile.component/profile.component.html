<div class="dashboard-layout">
  <app-navbar></app-navbar>

  <main class="main-content flex-center"> @if (loading) {
    <div class="loader">Chargement de ton profil...</div>
  }

    @if (profile) {
      <div class="identity-card">
        <div class="avatar-section">
          <img [src]="profile.avatar" alt="Avatar" class="main-avatar">
          <button class="btn-change-avatar" (click)="toggleAvatarSelector()">✏️ Changer</button>

          @if (showAvatarSelector) {
            <div class="avatar-selector">
              <p>Choisis ton avatar :</p>
              <div class="avatar-grid">
                @for (av of availableAvatars; track av) {
                  <img [src]="av" class="avatar-option" (click)="selectAvatar(av)">
                }
              </div>
            </div>
          }
        </div>

        <h1 class="pseudo">{{ profile.pseudo }}</h1>
        <p class="email">{{ profile.mail }}</p>
        <span class="badge">Membre d'AniSdouf</span>
      </div>
    }
  </main>
</div>
