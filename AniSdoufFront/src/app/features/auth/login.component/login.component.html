<div class="page">
  <img src="/logoAniSdouf.png" alt="AniSdouf Logo" class="floating-logo" />

  <div class="card">
    <h1 class="title">Bienvenue</h1>
    <p class="subtitle">Connectez-vous à votre espace personnel</p>

    @if (errorMessage) {
      <div class="error-banner">
        ⚠️ {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()">

      <div class="field">
        <label for="email">Adresse Email</label>
        <div class="input-wrap">
          <span class="input-icon">✉</span>
          <input
            id="email"
            type="email"
            placeholder="votre@email.com"
            [(ngModel)]="mail"
            name="email"
            autocomplete="email"
            [disabled]="loading"
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            [(ngModel)]="mdp"
            name="password"
            autocomplete="current-password"
            [disabled]="loading"
          />
        </div>
      </div>

      <button type="submit" class="btn-connect" [disabled]="loading">
        @if (!loading) {
          <span>Se connecter</span>
        } @else {
          <span class="spinner">Connexion...</span>
        }
      </button>

    </form>

    <hr class="divider" />

    <p class="register-link">
      Pas encore de compte ?
      <a routerLink="/register">S'inscrire</a>
    </p>

  </div>
</div>
