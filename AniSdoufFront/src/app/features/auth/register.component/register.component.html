<div class="page">
  <img src="/logoAniSdouf.png" alt="AniSdouf Logo" class="floating-logo" />

  <div class="card">
    <h1 class="title">Bienvenue</h1>
    <p class="subtitle">Inscrivez-vous à notre application</p>

    @if (errorMessage) {
      <div class="error-banner">
        ⚠️ {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="firstname">Pseudo</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input
            id="firstname"
            type="text"
            placeholder="votre pseudo"
            [(ngModel)]="pseudo"
            name="pseudo"
            [disabled]="loading"
          />
        </div>
      </div>

      <div class="field">
        <label for="email">Adresse Email</label>
        <div class="input-wrap">
          <span class="input-icon">✉</span>
          <input
            id="email"
            type="email"
            placeholder="votre@email.com"
            [(ngModel)]="mail"
            name="email"
            [disabled]="loading"
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            [(ngModel)]="mdp"
            name="password"
            [disabled]="loading"
          />
        </div>
      </div>

      <div class="field">
        <label for="confirm">Confirmer le mot de passe</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input id="confirm" type="password" placeholder="••••••••"
                 [(ngModel)]="confirmMdp" name="confirm" [disabled]="loading"/>
        </div>
      </div>

      <button type="submit" class="btn-register" [disabled]="loading">
        @if (!loading) {
          <span>S'inscrire</span>
        } @else {
          <span class="spinner">Inscription...</span>
        }
      </button>

    </form>

    <hr class="divider" />

    <p class="login-link">
      Déjà un compte ?
      <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
